name: Node.js CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repositorio
        uses: actions/checkout@v3

      - name: Preparamos Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalamos dependencias
        run: npm install

      - name: Hacer Lint en el Codigo
        run: npm run lint

      - name: Test de Aplicacion
        run: npm test